name: Build BlockForge APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Remover Gradle do sistema
        run: |
          sudo rm -rf /usr/share/gradle* /usr/bin/gradle /usr/local/bin/gradle 2>/dev/null || true
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip -d $HOME/gradle
          sudo ln -sf $HOME/gradle/gradle-8.2/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Android SDK
        uses: android-actions/setup-android@v2

      - name: Instalar SDK
        run: sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Criar projeto Android
        run: |
          mkdir -p android/app/src/main/java/com/blockforge/engine
          mkdir -p android/app/src/main/assets/www
          mkdir -p android/app/src/main/res/xml
          mkdir -p android/app/src/main/res/values

          cp www/index.html android/app/src/main/assets/www/index.html

          cat > android/app/src/main/java/com/blockforge/engine/MainActivity.java << 'JAVA'
          package com.blockforge.engine;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.os.Build;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      if (checkSelfPermission(Manifest.permission.WRITE_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(new String[]{Manifest.permission.READ_EXTERNAL_STORAGE, Manifest.permission.WRITE_EXTERNAL_STORAGE}, 1);
                      }
                  }
                  webView.loadUrl("file:///android_asset/www/index.html");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          JAVA

          cat > android/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.blockforge.engine">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <application
                  android:allowBackup="true"
                  android:label="BlockForge"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true"
                  android:networkSecurityConfig="@xml/network_security_config"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

          cat > android/app/src/main/res/xml/network_security_config.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors><certificates src="system" /></trust-anchors>
              </base-config>
          </network-security-config>
          XML

          cat > android/app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">BlockForge</string>
          </resources>
          XML

          cat > android/app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdk 33
              defaultConfig {
                  applicationId "com.blockforge.engine"
                  minSdk 22
                  targetSdk 33
                  versionCode 1
                  versionName "1.9.0"
              }
              buildTypes {
                  debug { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          GRADLE

          cat > android/build.gradle << 'GRADLE'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.4' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          GRADLE

          cat > android/settings.gradle << 'GRADLE'
          rootProject.name = "BlockForge"
          include ':app'
          GRADLE

          cd android
          gradle wrapper --gradle-version=8.2 --distribution-type=bin
          chmod +x gradlew

      - name: Compilar APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Baixar APK
        uses: actions/upload-artifact@v4
        with:
          name: BlockForge-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
