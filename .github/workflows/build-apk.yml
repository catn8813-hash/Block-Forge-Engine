name: Build BlockForge APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Tools
        run: sdkmanager "platforms;android-33" "build-tools;33.0.2"

      - name: Instalar Cordova
        run: npm install -g cordova@12

      - name: Adicionar Android
        run: cordova platform add android@12

      - name: Instalar Plugins
        run: |
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-whitelist
          cordova plugin add cordova-plugin-statusbar
          cordova plugin add cordova-plugin-splashscreen

      - name: Compilar APK
        run: cordova build android --debug

      - name: Baixar APK
        uses: actions/upload-artifact@v4
        with:
          name: BlockForge-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
