name: Build BlockForge APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Substituir Gradle do sistema por 7.6.4
        run: |
          sudo rm -rf /usr/share/gradle* /usr/bin/gradle /usr/local/bin/gradle 2>/dev/null || true
          wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
          unzip -q gradle-7.6.4-bin.zip -d $HOME/gradle
          sudo ln -sf $HOME/gradle/gradle-7.6.4/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Android SDK
        uses: android-actions/setup-android@v2

      - name: Instalar SDK 33
        run: |
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Instalar Cordova
        run: npm install -g cordova@11

      - name: Adicionar Android
        run: cordova platform add android@11

      - name: Instalar Plugins
        run: |
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-whitelist

      - name: Compilar APK
        run: cordova build android --debug

      - name: Baixar APK
        uses: actions/upload-artifact@v4
        with:
          name: BlockForge-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
