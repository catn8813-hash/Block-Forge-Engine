name: Build BlockForge APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Gradle 8.7
        run: |
          sudo apt-get remove -y gradle 2>/dev/null || true
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.7/bin" >> $GITHUB_PATH
          export PATH="$HOME/gradle/gradle-8.7/bin:$PATH"
          gradle --version

      - name: Configurar Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q commandlinetools-linux-11076708_latest.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Instalar SDK Android
        run: |
          yes | sdkmanager --sdk_root=$HOME/android-sdk --licenses || true
          sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Instalar Cordova
        run: npm install -g cordova@12

      - name: Adicionar plataforma Android
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH="$HOME/gradle/gradle-8.7/bin:$PATH"
          cordova platform add android@12

      - name: Instalar Plugins
        run: |
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-whitelist
          cordova plugin add cordova-plugin-statusbar
          cordova plugin add cordova-plugin-splashscreen

      - name: Compilar APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH="$HOME/gradle/gradle-8.7/bin:$PATH"
          cordova build android --debug

      - name: Baixar APK
        uses: actions/upload-artifact@v4
        with:
          name: BlockForge-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
